# =============================================================================
# Atomic Test Workflow (DO NOT USE)
# =============================================================================
#
# This reusable workflow handles test execution.
# It supports both CI and Release configurations via inputs:
#   - Unit Tests (with optional coverage)
#   - E2E Tests (with optional fail-fast)
#   - Artifact Download/Management
#
# =============================================================================

name: Test (DO NOT USE)

on:
    workflow_call:
        inputs:
            upload-coverage:
                description: 'Whether to upload coverage reports'
                type: boolean
                default: true
            e2e-fail-fast:
                description: 'Stop E2E tests on first failure'
                type: boolean
                default: false
            artifact-suffix:
                description: 'Suffix for artifact names (e.g., "-release")'
                type: string
                default: ''

# =============================================================================
# Permissions
# =============================================================================
# Restrict default GITHUB_TOKEN permissions (OpenSSF Scorecard best practice)
# Jobs declare their own permissions as needed
permissions: {}

env:
    NODE_VERSION: '20'
    CI: true
    ELECTRON_ENABLE_LOGGING: true
    npm_config_fetch_retries: '3'
    npm_config_fetch_retry_mintimeout: '10000'
    npm_config_fetch_retry_maxtimeout: '60000'

jobs:
    # ===========================================================================
    # Unit Tests
    # ===========================================================================
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            # Download build artifacts from _build.yml
            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Run Unit Tests
              run: npm run test && npm run test:electron
              env:
                  FORCE_COLOR: 1

            # Optionally upload coverage (CI workflow only)
            - name: Upload Frontend Coverage Report
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              if: inputs.upload-coverage
              with:
                  name: coverage-frontend
                  path: coverage/
                  retention-days: 7

            - name: Upload Electron Coverage Report
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              if: inputs.upload-coverage
              with:
                  name: coverage-electron
                  path: coverage-electron/
                  retention-days: 7

    # ===========================================================================
    # Integration Tests
    # ===========================================================================
    coordinated-tests:
        name: Coordinated Tests (${{ matrix.os }})
        needs: unit-tests
        runs-on: ${{ matrix.os }}
        timeout-minutes: 15
        permissions:
            contents: read

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            # Linux-specific: Install dependencies and configure for headless Electron
            - name: Setup Linux Environment
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
                  # Install Electron runtime dependencies only (keep apt install fast for CI)
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y --no-install-recommends xvfb libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libayatana-appindicator3-1 libxtst6
                  # Ubuntu 24.04+ restricts unprivileged user namespaces which breaks Electron
                  # See: https://github.com/electron/electron/issues/41066
                  sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

            - name: Run Coordinated Tests
              run: npm run test:coordinated
              env:
                  FORCE_COLOR: 1

    integration-tests:
        name: Integration Tests (${{ matrix.os }})
        needs: unit-tests
        runs-on: ${{ matrix.os }}
        timeout-minutes: ${{ matrix.timeout_minutes }}
        permissions:
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      timeout_minutes: 25
                    - os: windows-latest
                      timeout_minutes: 30
                    - os: macos-latest
                      timeout_minutes: 25

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            # Linux-specific: Install dependencies and configure for headless Electron
            - name: Setup Linux Environment
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
                  # Install Electron runtime dependencies only (keep apt install fast for CI)
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y --no-install-recommends xvfb libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libayatana-appindicator3-1 libxtst6
                  # Ubuntu 24.04+ restricts unprivileged user namespaces which breaks Electron
                  # See: https://github.com/electron/electron/issues/41066
                  sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

            - name: Run Real Integration Tests
              # DO NOT use xvfb-run wrapper - wdio-electron-service's autoXvfb handles xvfb
              run: npm run test:integration
              shell: bash
              env:
                  FORCE_COLOR: 1

    # ===========================================================================
    # E2E Tests - Windows
    # ===========================================================================
    e2e-tests-windows:
        name: E2E / 🪟 Windows / ${{ matrix.group }}
        needs: unit-tests
        runs-on: windows-latest
        timeout-minutes: 20
        permissions:
            contents: read

        strategy:
            fail-fast: ${{ inputs.e2e-fail-fast }}
            matrix:
                group: [startup, window, menu, hotkeys, quickchat, options, theme, auth, tray, update, stability, toast]

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Check Build Artifacts Exist
              run: |
                  if [[ ! -f dist/index.html ]]; then
                    echo "ERROR: dist/index.html not found"
                    exit 1
                  fi
                  if [[ ! -f dist-electron/main/main.cjs ]]; then
                    echo "ERROR: dist-electron/main/main.cjs not found"
                    exit 1
                  fi
                  if [[ ! -f dist-electron/preload/preload.cjs ]]; then
                    echo "ERROR: dist-electron/preload/preload.cjs not found"
                    exit 1
                  fi
              shell: bash

            - name: Run E2E Tests
              run: npm run test:e2e:group:${{ matrix.group }}
              shell: bash
              env:
                  SKIP_BUILD: 'true'
                  ELECTRON_USE_DIST: 'true'
                  DEBUG: 'wdio:*'

            - name: Upload E2E Screenshots (on failure)
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              if: failure()
              with:
                  name: e2e-screenshots${{ inputs.artifact-suffix }}-${{ matrix.group }}-windows-latest
                  path: |
                      tests/e2e/screenshots/
                      tests/e2e/logs/
                  retention-days: 7
                  if-no-files-found: ignore

    # ===========================================================================
    # E2E Tests - macOS
    # ===========================================================================
    e2e-tests-macos:
        name: E2E / 🍎 macOS / ${{ matrix.group }}
        needs: unit-tests
        runs-on: macos-latest
        timeout-minutes: 20
        permissions:
            contents: read

        strategy:
            fail-fast: ${{ inputs.e2e-fail-fast }}
            matrix:
                group:
                    [
                        startup,
                        window,
                        menu,
                        hotkeys,
                        quickchat,
                        options,
                        theme,
                        auth,
                        tray,
                        update,
                        stability,
                        toast,
                        macos,
                    ]

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Check Build Artifacts Exist
              run: |
                  if [[ ! -f dist/index.html ]]; then
                    echo "ERROR: dist/index.html not found"
                    exit 1
                  fi
                  if [[ ! -f dist-electron/main/main.cjs ]]; then
                    echo "ERROR: dist-electron/main/main.cjs not found"
                    exit 1
                  fi
                  if [[ ! -f dist-electron/preload/preload.cjs ]]; then
                    echo "ERROR: dist-electron/preload/preload.cjs not found"
                    exit 1
                  fi
              shell: bash

            - name: Run E2E Tests
              run: npm run test:e2e:group:${{ matrix.group }}
              shell: bash
              env:
                  SKIP_BUILD: 'true'
                  ELECTRON_USE_DIST: 'true'
                  DEBUG: 'wdio:*'

            - name: Upload E2E Screenshots (on failure)
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              if: failure()
              with:
                  name: e2e-screenshots${{ inputs.artifact-suffix }}-${{ matrix.group }}-macos-latest
                  path: |
                      tests/e2e/screenshots/
                      tests/e2e/logs/
                  retention-days: 7
                  if-no-files-found: ignore

    # ===========================================================================
    # E2E Tests - Ubuntu
    # ===========================================================================
    e2e-tests-ubuntu:
        name: E2E / 🐧 Ubuntu / ${{ matrix.group }}
        needs: unit-tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read

        strategy:
            fail-fast: ${{ inputs.e2e-fail-fast }}
            matrix:
                group: [startup, window, menu, hotkeys, quickchat, options, theme, auth, tray, update, stability, toast]

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Setup Linux Environment
              run: |
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
                  # Install Electron runtime dependencies only (keep apt install fast for CI)
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y --no-install-recommends xvfb libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libayatana-appindicator3-1 libxtst6
                  # Ubuntu 24.04+ restricts unprivileged user namespaces which breaks Electron
                  # See: https://github.com/electron/electron/issues/41066
                  sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Check Build Artifacts Exist
              run: |
                  if [[ ! -f dist/index.html ]]; then
                    echo "ERROR: dist/index.html not found"
                    exit 1
                  fi
                  if [[ ! -f dist-electron/main/main.cjs ]]; then
                    echo "ERROR: dist-electron/main/main.cjs not found"
                    exit 1
                  fi
                  if [[ ! -f dist-electron/preload/preload.cjs ]]; then
                    echo "ERROR: dist-electron/preload/preload.cjs not found"
                    exit 1
                  fi
              shell: bash

            - name: Run E2E Tests
              # DO NOT use xvfb-run wrapper here - it sets DISPLAY which conflicts with
              # wdio-electron-service's autoXvfb feature for parallel worker processes
              run: npm run test:e2e:group:${{ matrix.group }}
              shell: bash
              env:
                  SKIP_BUILD: 'true'
                  ELECTRON_USE_DIST: 'true'
                  DEBUG: 'wdio:*'

            - name: Upload E2E Screenshots (on failure)
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              if: failure()
              with:
                  name: e2e-screenshots${{ inputs.artifact-suffix }}-${{ matrix.group }}-ubuntu-latest
                  path: |
                      tests/e2e/screenshots/
                      tests/e2e/logs/
                  retention-days: 7
                  if-no-files-found: ignore

    # ===========================================================================
    # Release E2E Tests (Packaged Builds)
    # ===========================================================================
    release-e2e-tests:
        name: Release E2E / ${{ matrix.emoji }} ${{ matrix.platform }}
        # Run in parallel with integration tests - only need unit tests to pass
        needs: unit-tests
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        permissions:
            contents: read

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                include:
                    - os: ubuntu-latest
                      dist-script: 'dist:linux'
                      emoji: '🐧'
                      platform: 'Ubuntu'
                    - os: macos-latest
                      dist-script: 'dist:mac-arm64'
                      emoji: '🍎'
                      platform: 'macOS'

        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            # Linux-specific: Install dependencies and configure for headless Electron
            - name: Setup Linux Environment
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
                  # Install Electron runtime dependencies only (keep apt install fast for CI)
                  sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y --no-install-recommends xvfb libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libayatana-appindicator3-1 libxtst6
                  # Ubuntu 24.04+ restricts unprivileged user namespaces which breaks Electron
                  sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            # Download build artifacts from _build.yml
            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            # Package the application for this platform
            - name: Package Application
              run: npm run ${{ matrix.dist-script }}
              shell: bash

            # Run release E2E tests against packaged build
            - name: Run Release E2E Tests
              # DO NOT use xvfb-run wrapper - wdio-electron-service's autoXvfb handles xvfb
              run: npm run test:e2e:release
              shell: bash
              env:
                  DEBUG: 'wdio:*'

            # Upload artifacts on failure for debugging
            - name: Upload Release E2E Screenshots (on failure)
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              if: failure()
              with:
                  name: release-e2e-screenshots${{ inputs.artifact-suffix }}-${{ matrix.os }}
                  path: |
                      tests/e2e/screenshots/
                      tests/e2e/logs/
                      release/
                  retention-days: 7
                  if-no-files-found: ignore
