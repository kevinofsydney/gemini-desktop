# =============================================================================
# Atomic Release Workflow (Reusable)
# =============================================================================
#
# This reusable workflow handles the packaging and publishing process.
#
# Strategy: Build with --publish never, then upload via softprops/action-gh-release
# This avoids electron-builder's buggy GitHub upload mechanism that causes
# "already_exists" errors on blockmap files.
#
# =============================================================================

name: Release (Reusable)

on:
    workflow_call:

# =============================================================================
# Permissions
# =============================================================================
# Restrict default GITHUB_TOKEN permissions (OpenSSF Scorecard best practice)
# Jobs declare their own permissions as needed
permissions: {}

env:
    NODE_VERSION: '20'
    CI: true
    ELECTRON_ENABLE_LOGGING: true
    npm_config_fetch_retries: '3'
    npm_config_fetch_retry_mintimeout: '10000'
    npm_config_fetch_retry_maxtimeout: '60000'

jobs:
    # ==========================================================================
    # macOS x64 Build
    # ==========================================================================
    macos-x64:
        name: macOS (x64)
        runs-on: macos-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: x64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:mac-x64

            - name: Generate Checksums
              run: |
                  cd release
                  shasum -a 256 *.dmg *.zip > checksums-macos-x64.txt

            - name: Prepare macOS update metadata (x64)
              run: |
                  cd release
                  if [ ! -f latest-mac.yml ]; then
                    echo "Error: expected latest-mac.yml to be generated, but it was not found in the release directory."
                    exit 1
                  fi
                  mv latest-mac.yml latest-mac-x64.yml

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.dmg
                      release/*.zip
                      release/*.zip.blockmap
                      release/checksums-macos-x64.txt
                      release/latest-mac-x64.yml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-macos-x64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    # ==========================================================================
    # macOS arm64 Build
    # ==========================================================================
    macos-arm64:
        name: macOS (arm64)
        runs-on: macos-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: arm64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:mac-arm64

            - name: Generate Checksums
              run: |
                  cd release
                  shasum -a 256 *.dmg *.zip > checksums-macos-arm64.txt

            - name: Prepare macOS update metadata (arm64)
              run: |
                  cd release
                  if [ ! -f latest-mac.yml ]; then
                    echo "Error: expected latest-mac.yml to be generated, but it was not found in the release directory."
                    exit 1
                  fi
                  mv latest-mac.yml latest-mac-arm64.yml

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.dmg
                      release/*.zip
                      release/*.zip.blockmap
                      release/checksums-macos-arm64.txt
                      release/latest-mac-arm64.yml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-macos-arm64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    windows-x64:
        name: Windows (x64)
        runs-on: windows-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: x64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:win-x64
              shell: bash
              env:
                  AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
                  AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
                  AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

            - name: Run Release E2E Tests
              run: npm run test:e2e:release
              shell: bash

            - name: Prepare Windows update metadata (x64)
              run: |
                  cd release
                  if (!(Test-Path latest.yml)) { throw 'Error: expected latest.yml to be generated, but it was not found in the release directory.' }
                  Copy-Item -Path latest.yml -Destination latest-x64.yml -Force
                  # TODO(v0.10.x cleanup): Remove legacy x64.yml/arm64.yml aliases after ~3-4 releases past v0.10.1,
                  # once the installed base has moved off v0.10.0 and no longer requests arch-only channel files.
                  Copy-Item -Path latest-x64.yml -Destination x64.yml -Force
              shell: pwsh

            - name: Generate Checksums
              run: |
                  cd release
                  $files = @(Get-ChildItem -Path *.exe -File) + @(Get-ChildItem -Path *.msi -File)
                  if ($files.Count -eq 0) { throw 'No .exe or .msi files found in release/ for checksum generation.' }
                  $files | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Out-File checksums-windows.txt
              shell: pwsh

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.exe
                      release/*.msi
                      release/*.exe.blockmap
                      release/latest.yml
                      release/latest-x64.yml
                      release/x64.yml
                      release/checksums-windows.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-windows-x64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    windows-arm64:
        name: Windows (arm64)
        runs-on: windows-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: arm64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:win-arm64
              shell: bash
              env:
                  AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
                  AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
                  AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

            - name: Run Release E2E Tests
              run: npm run test:e2e:release
              shell: bash

            - name: Prepare Windows update metadata (arm64)
              run: |
                  cd release
                  if (!(Test-Path latest.yml)) { throw 'Error: expected latest.yml to be generated, but it was not found in the release directory.' }
                  # TODO(v0.10.x cleanup): Remove legacy x64.yml/arm64.yml aliases after ~3-4 releases past v0.10.1,
                  # once the installed base has moved off v0.10.0 and no longer requests arch-only channel files.
                  Copy-Item -Path latest.yml -Destination latest-arm64.yml -Force
                  Copy-Item -Path latest-arm64.yml -Destination arm64.yml -Force
                  Remove-Item -Path latest.yml -Force
              shell: pwsh

            - name: Generate Checksums
              run: |
                  cd release
                  $files = @(Get-ChildItem -Path *.exe -File) + @(Get-ChildItem -Path *.msi -File)
                  if ($files.Count -eq 0) { throw 'No .exe or .msi files found in release/ for checksum generation.' }
                  $files | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Out-File checksums-windows-arm64.txt
              shell: pwsh

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.exe
                      release/*.msi
                      release/*.exe.blockmap
                      release/latest-arm64.yml
                      release/arm64.yml
                      release/checksums-windows-arm64.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
              with:
                  name: release-artifacts-windows-arm64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    # ==========================================================================
    # Linux Build
    # ==========================================================================
    linux:
        name: Linux (x64)
        runs-on: ubuntu-latest
        permissions:
            contents: write # Required for release upload
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:linux

            - name: Run Release E2E Tests
              run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e:release

            - name: Generate Checksums
              run: |
                  cd release
                  sha256sum *.AppImage *.deb *.rpm *.tar.gz > checksums-linux.txt

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.AppImage
                      release/*.deb
                      release/*.rpm
                      release/*.tar.gz
                      release/latest-linux.yml
                      release/checksums-linux.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-linux
                  path: release/
                  retention-days: 7
                  if-no-files-found: error
